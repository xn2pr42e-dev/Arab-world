<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arab Chat</title>
<link rel="stylesheet" href="style.css">
<style>
body{
    font-family: Arial,sans-serif;
    background:#f2f2f2;
}

.chat{
    width:90%;
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

.messages{
    height:300px;
    border:1px solid #ccc;
    overflow-y:auto;
    padding:10px;
    margin-bottom:10px;
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px;
}
</style>
</head>

<body>

<div class="chat">
<h2>Arab Chat</h2>

<div id="messages" class="messages"></div>
<input id="username" placeholder="اكتب اسمك">
<input id="message" placeholder="اكتب رسالة">
<button onclick="toggleEmoji()">😊</button>
<div id="emojiBox">
  <button onclick="addEmoji('😊')">😊</button>
  <button onclick="addEmoji('😂')">😂</button>
  <button onclick="addEmoji('❤️')">❤️</button>
  <button onclick="addEmoji('👍')">👍</button>
  <button onclick="addEmoji('🔥')">🔥</button>
</div>
<div id="emojiBox" style="display:none;"> </div> style="display:none;margin:5px;">
😊 😂 ❤️ 👍 🔥 😍 😢 🎉
</div>
<button onclick="sendMessage()">إرسال</button>

</div>

<script>
const protocol = location.protocol === "https:" ? "wss://" : "ws://";
const socket = new WebSocket(protocol + location.host);

const messages = document.getElementById("messages");

socket.onmessage = function(event){
  socket.onmessage = function(event){
    messages.innerHTML += "<div style='background:#dcf8c6;padding:10px;margin:8px 0;border-radius:10px;'>🟢 " + event.data + "</div>";
    messages.scrollTop = messages.scrollHeight;
};  
    messages.scrollTop = messages.scrollHeight;
};

function sendMessage(){
    const input = document.getElementById("message");

    if(input.value.trim() !== ""){
       const username = document.getElementById("username").value || "مستخدم";

const now = new Date();
const time = now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");

socket.send(username + " (" + time + "): " + input.value);
    }
}
function addEmoji(emoji = "😊") {
    document.getElementById("message").value += emoji;
}
function toggleEmoji() {
    const box = document.getElementById("emojiBox");

    if (box.style.display === "none") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}
</script>

</body>
</html>
